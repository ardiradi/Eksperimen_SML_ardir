name: Preprocessing Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'preprocessing/**'
      - '.github/workflows/preprocessing.yml'
  workflow_dispatch:

jobs:
  preprocess:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn joblib
      
      - name: Run Preprocessing Pipeline
        run: |
          cd preprocessing
          python automate_ardir.py
      
      - name: Upload Preprocessed Data
        uses: actions/upload-artifact@v4
        with:
          name: preprocessed-dataset
          path: preprocessing/wine_quality_preprocessing/
          retention-days: 30
      
      - name: Commit Preprocessed Data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add preprocessing/wine_quality_preprocessing/
          git diff --staged --quiet || git commit -m "Auto-update preprocessed data [skip ci]"
          git push || echo "Nothing to push"
